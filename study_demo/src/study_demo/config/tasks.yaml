plan_task:
  description: >
    用户输入的主题是：{topic}

    你需要先不要直接回答主题本身，而是把这个任务拆成 3 到 5 个步骤。
    对每个步骤说明：
    1. 为什么需要这一步
    2. 这一部分要分析什么
    3. 这一部分应该产出什么
    4. 建议的执行顺序

    输出要结构化，便于后续研究员继续执行。
  expected_output: >
    一份结构化任务拆解方案，包含步骤列表、每步目标、产出和执行顺序。
  agent: planner

research_task:
  description: >
    用户输入的主题是：{topic}

    当前默认读取 knowledge 根目录中的资料。
    请结合前面的任务规划结果，对这个主题做研究分析。
    如果主题和 knowledge 目录中的资料、目录结构、文件内容有关，你需要优先调用工具获取真实信息，而不是直接猜测。

    工具使用要求：
    1. 当你需要先了解 knowledge 目录结构时，调用 list_project_files(".")
    2. 当你已经定位到具体文件后，调用 read_local_file(file_path)
    3. 先基于工具结果提取事实，再结合主题做分析总结
    4. 如果工具结果不足以支持结论，要明确说明信息不足，而不是编造内容

    你的输出至少包含以下部分：
    1. 一句话定义
    2. 它要解决的问题
    3. 核心组成部分
    4. 典型工作流程
    5. 一个最小可运行 demo 应该包含什么
    6. 初学者最容易混淆的 3 个点

    要求：
    - 条理清晰
    - 分层表达
    - 尽量适合初学者阅读
    - 如果使用了工具，请在内容中体现你参考了哪些 knowledge 文件
  expected_output: >
    一份完整的结构化研究笔记，包含定义、问题、组成、流程、demo 思路和常见误区。
  agent: researcher

review_task:
  description: >
    请检查前面的研究结果，重点审查以下内容：
    1. 是否真正回答了原始主题
    2. 结构是否完整
    3. 是否存在逻辑跳跃
    4. 是否有表述模糊或重复
    5. 是否适合初学者阅读

    如果发现问题，请直接修正并输出最终版本。
    最终输出格式要求：
    1. 一句话定义
    2. 为什么重要
    3. 它是怎么工作的
    4. 最小 demo 结构
    5. 常见误区
    6. 下一步建议
  expected_output: >
    一份经过审核、修正和整理后的最终中文说明，可直接给用户阅读。
  agent: reviewer
