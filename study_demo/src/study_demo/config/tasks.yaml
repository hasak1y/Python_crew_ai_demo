research_task:
  description: >
    搜索主题：{topic}

    请完成：
    1. 搜索关于伊朗和美国的最新新闻
    2. 收集相关的新闻报道和信息
    3. 整理重要事件和关键信息
    4. 识别主要观点和立场
    5. 收集时间线和背景信息
  expected_output: >
    一份详细的新闻收集报告，包含：
    - 最新新闻事件
    - 关键信息和数据
    - 主要观点和立场
    - 时间线信息
    - 背景资料
  agent: researcher

write_task:
  description: >
    根据新闻研究员收集的信息，将内容整理为一份清晰、客观的中文新闻总结。
    输出格式必须包含：
    1. 新闻概览
    2. 主要事件总结
    3. 关键观点分析
    4. 影响和意义
    5. 后续关注点
  expected_output: >
    一份结构清晰、客观中立的中文新闻总结，便于读者快速了解伊朗和美国相关的重要新闻。
  agent: writer