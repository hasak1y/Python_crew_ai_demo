# config_version: tasks-v1.1.0
# workflow_version: workflow-v1.1.0
# prompt_version: prompt-v1.1.0
plan_task:
  description: >
    用户输入的主题是：{topic}

    请先不要直接回答主题本身，而是把这个问题拆成 3 到 5 个分析步骤。
    对每个步骤说明：
    1. 为什么需要这一步
    2. 这一部分要分析什么
    3. 这一部分应该产出什么
    4. 建议的执行顺序

    如果主题看起来与 knowledge 目录中的本地资料有关，也请在步骤中说明
    “什么时候值得查看 knowledge”，但不要默认把所有问题都导向 knowledge。
  expected_output: >
    一份结构化任务拆解方案，包含步骤列表、每步目标、产出和执行顺序。
  agent: planner

research_task:
  description: >
    用户输入的主题是：{topic}

    请结合前面的任务规划结果，对这个主题做研究分析。

    关于 knowledge 的使用规则：
    1. 如果主题明显要求读取本地资料、总结 knowledge 内容、解释 knowledge 中的文件，应该优先调用工具
    2. 如果主题本身是通用技术问题，例如解释概念、原理、架构、方案比较，则不必强行读取 knowledge
    3. 如果你使用了工具，请在回答里说明参考了哪些文件或目录
    4. 如果 knowledge 中没有相关资料，不要把“资料不足”当成唯一答案；对于通用技术问题，仍应正常完成分析
    5. 不要虚构 knowledge 中不存在的文件内容

    你的输出至少包含以下部分：
    1. 一句话定义
    2. 它要解决的问题
    3. 核心组成部分
    4. 典型工作流程
    5. 一个最小可运行 demo 应该包含什么
    6. 初学者最容易混淆的 3 个点

    要求：
    - 条理清晰
    - 分层表达
    - 尽量适合初学者阅读
    - 如果引用了 knowledge，请单独标明“本地资料参考”
  expected_output: >
    一份完整的结构化研究笔记，包含定义、问题、组成、流程、demo 思路和常见误区。
  agent: researcher

review_task:
  description: >
    请检查前面的研究结果，重点审查以下内容：
    1. 是否真正回答了原始主题
    2. 结构是否完整
    3. 是否存在逻辑跳跃
    4. 是否有表述模糊或重复
    5. 是否适合初学者阅读
    6. 如果使用了 knowledge，是否正确说明了本地资料依据
    7. 如果主题本来不依赖 knowledge，是否避免了被 knowledge 内容带偏

    如果发现问题，请直接修正并输出最终版本。
    最终输出格式要求：
    1. 一句话定义
    2. 为什么重要
    3. 它是怎么工作的
    4. 最小 demo 结构
    5. 常见误区
    6. 下一步建议

    如果使用了本地资料，可在最后补充一节“本地资料参考”。
  expected_output: >
    一份经过审核、修正和整理后的最终中文说明，可直接给用户阅读。
  agent: reviewer
