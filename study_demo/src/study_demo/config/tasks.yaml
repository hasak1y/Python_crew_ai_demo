research_task:
  description: >
    研究主题：{topic}

    请完成：
    1. 给出这个主题的定义
    2. 解释它解决什么问题
    3. 说明它的核心组成部分
    4. 给出一个最小可运行示例思路
    5. 给出初学者最容易混淆的3个点
  expected_output: >
    一份结构化研究笔记，包含：
    - 主题定义
    - 解决的问题
    - 核心组成
    - 最小示例思路
    - 3个常见误区
  agent: researcher

write_task:
  description: >
    根据研究员给出的结果，将内容整理为一份适合初学者阅读的中文学习说明。
    输出格式必须包含：
    1. 一句话定义
    2. 为什么它重要
    3. 它是怎么工作的
    4. 一个最小demo应该包含什么
    5. 下一步学什么
  expected_output: >
    一份层次清晰的中文技术说明，适合刚接触该主题的开发者。
  agent: writer