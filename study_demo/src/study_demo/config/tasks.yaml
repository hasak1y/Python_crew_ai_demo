plan_task:
  description: >
    用户问题是：{topic}

    请先不要直接回答，而是先把这个问题拆成 3 到 5 个子任务。
    对每个子任务说明：
    1. 为什么需要这一步
    2. 这一部分要产出什么
    3. 建议执行顺序
  expected_output: >
    一份结构化的任务拆解方案，包含子任务列表、执行顺序和每步产出。
  agent: planner

research_task:
  description: >
    基于前面的任务规划，完成主题研究：{topic}

    请输出：
    1. 核心定义
    2. 要解决的问题
    3. 关键组成部分
    4. 一个最小可运行版本的设计思路
    5. 初学者容易混淆的地方
  expected_output: >
    一份结构化研究笔记，适合作为后续成稿输入。
  agent: researcher

review_task:
  description: >
    请检查前面的研究结果是否：
    1. 回答了原始问题
    2. 结构完整
    3. 对初学者清晰
    4. 没有明显逻辑跳跃

    如果有问题，请直接修正后输出最终版本。
  expected_output: >
    一份经过审核和修正的最终说明，结构清晰、逻辑完整、可直接阅读。
  agent: reviewer
